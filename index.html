<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星屿小游戏站 | 休闲治愈小游戏合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:38px;font-weight:300;letter-spacing:6px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
animation:softFlash 3s ease-in-out infinite alternate;
}
@keyframes softFlash{0%{opacity:0.75;}100%{opacity:1;}}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:24px;}
.game-card{background:rgba(10,14,30,0.5);padding:18px;border-radius:14px;text-align:center;border:1px solid #839cff30;transition:0.3s;}
.game-card:hover{transform:translateY(-6px);box-shadow:0 0 20px #839cff50;}
.game-card p{color:#c0ccff;margin-top:10px;font-size:17px;}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;text-decoration:none;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
.visit-num{color:#c0ccff;margin-top:12px;font-size:15px;letter-spacing:1px;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>
<body class="dark">
<div class="theme-switch">
<button class="btn" onclick="toggleTheme()">切换静谧/温柔模式</button>
</div>
<div class="broad">
<div class="broad-text">星屿小游戏｜贪吃蛇｜俄罗斯方块｜拼图｜消消乐｜游戏评论区｜自定义全局星空背景｜明暗双主题切换</div>
</div>
<div style="text-align:center;margin:30px 0;">
<h1 class="soul-title">星屿小游戏站</h1>
<p style="color:#c0ccff;margin-top:10px;letter-spacing:2px;">休闲解压小游戏，无聊时放松自己</p>
<div class="visit-num" id="visitBox">访问次数加载中...</div>
</div>
<nav>
<a href="index.html">首页</a>

</nav>
<div class="box">
<h2>今日推荐小游戏</h2>
<div class="game-grid">
<div class="game-card">
<p>贪吃蛇</p>
<a href="snake.html" class="btn">开始游玩</a>
</div>
<div class="game-card">
<p>俄罗斯方块</p>
<a href="block.html" class="btn">开始游玩</a>
</div>
<div class="game-card">
<p>治愈拼图</p>
<a href="puzzle.html" class="btn">开始游玩</a>
</div>
<div class="game-card">
<p>点击消消乐</p>
<a href="click.html" class="btn">开始游玩</a>
</div>
</div>
</div>
<div class="box">
<h2>快速导航</h2>
<a href="gameList.html" class="btn">完整游戏列表</a>
<a href="comment.html" class="btn">玩家留言评论</a>

</div>
<footer>星屿小游戏站 © 2026 | 纯前端本地小游戏，无需联网加载</footer>
<script>
// 星空粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
// 主题切换
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
// 访客统计
function countVisit(){
let num = localStorage.getItem("gameVisitTotal") || 0;
num = Number(num)+1;
localStorage.setItem("gameVisitTotal",num);
document.getElementById("visitBox").innerText = "本站累计访客："+num+" 位玩家";
}
countVisit();
// 读取全局背景
window.onload = function(){
let saveBg = localStorage.getItem("gameGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
</body>
