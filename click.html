<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>点击消消乐 | 星屿小游戏站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:34px;font-weight:300;letter-spacing:5px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);text-align:center;}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;text-align:left;}
#gameGrid{width:360px;margin:20px auto;display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.cell{width:54px;height:54px;border-radius:8px;cursor:pointer;transition:0.2s;}
.cell:hover{transform:scale(0.95);}
.cell.hide{visibility:hidden;}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
.info-text{color:#c0ccff;font-size:18px;margin:10px 0;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>
<body class="dark">
<div class="theme-switch">
<button class="btn" onclick="toggleTheme()">切换静谧/温柔模式</button>
</div>
<div class="broad">
<div class="broad-text">点击消消乐｜点击相邻相同色块消除，清空全部方块通关</div>
</div>
<div style="text-align:center;margin:30px 0;">
<h1 class="soul-title">点击消消乐</h1>
<p style="color:#c0ccff;margin-top:10px;letter-spacing:2px;">轻松休闲消除小游戏</p>
</div>
<nav>
<a href="index.html">首页</a>
<a href="gameList.html">全部游戏</a>
<a href="snake.html">贪吃蛇</a>
<a href="block.html">俄罗斯方块</a>
<a href="puzzle.html">拼图游戏</a>
<a href="click.html">点击消消乐</a>
<a href="comment.html">玩家评论</a>
<a href="materialGame.html">背景素材</a>
</nav>
<div class="box">
<h2>游戏面板</h2>
<div class="info-text">剩余方块：<span id="restNum">36</span></div>
<div id="gameGrid"></div>
<div>
<button class="btn" onclick="resetGame()">重新开局</button>
</div>
<p style="color:#949fc7;margin-top:15px;">规则：点击两个上下/左右相邻、颜色相同方块即可消除</p>
</div>
<footer>星屿小游戏站 © 2026</footer>
<script>
const gridDom = document.getElementById("gameGrid");
const restDom = document.getElementById("restNum");
const colors = ["#839cff","#a8b8ff","#d0daff","#627fff","#c0ccff"];
let cellList = [];
let selectIdx = null;
const total = 36;

// 初始化游戏
function initGame(){
    gridDom.innerHTML = "";
    cellList = [];
    selectIdx = null;
    for(let i=0;i<total;i++){
        let c = colors[Math.floor(Math.random()*colors.length)];
        cellList.push({color:c,show:true});
        let div = document.createElement("div");
        div.className = "cell";
        div.style.background = c;
        div.dataset.id = i;
        div.onclick = ()=>clickCell(i);
        gridDom.appendChild(div);
    }
    updateRest();
}
// 更新剩余数量
function updateRest(){
    let count = cellList.filter(item=>item.show).length;
    restDom.innerText = count;
    if(count === 0){
        setTimeout(()=>alert("全部消除完毕，恭喜通关！"),300);
    }
}
// 检测是否相邻
function isNear(a,b){
    let x1 = a % 6;
    let y1 = Math.floor(a / 6);
    let x2 = b % 6;
    let y2 = Math.floor(b / 6);
    let dx = Math.abs(x1 - x2);
    let dy = Math.abs(y1 - y2);
    return (dx === 1 && dy === 0) || (dx === 0 && dy === 1);
}
// 点击方块
function clickCell(i){
    if(!cellList[i].show) return;
    if(selectIdx === null){
        selectIdx = i;
    }else{
        let s = selectIdx;
        if(s === i){
            selectIdx = null;
            return;
        }
        if(isNear(s,i) && cellList[s].color === cellList[i].color){
            cellList[s].show = false;
            cellList[i].show = false;
            renderAll();
            updateRest();
        }
        selectIdx = null;
    }
}
// 重绘面板
function renderAll(){
    let cells = gridDom.querySelectorAll(".cell");
    cells.forEach((dom,i)=>{
        if(!cellList[i].show){
            dom.classList.add("hide");
        }else{
            dom.classList.remove("hide");
        }
    })
}
function resetGame(){
    initGame();
}

// 星空粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
window.onload = function(){
initGame();
let saveBg = localStorage.getItem("gameGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
</body>
</html>
