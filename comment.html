<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>玩家评论区 | 星屿小游戏站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"思源宋体",serif;}
body.dark{background:#0c101c;color:#e8edf7;}
body.light{background:#f7f9ff;color:#222940;}
.star{position:fixed;pointer-events:none;animation:starFloat 12s linear infinite;opacity:0.6;z-index:-1;}
@keyframes starFloat{
0%{transform:translateY(100vh) rotate(0deg);opacity:0;}
15%{opacity:1;}
85%{opacity:1;}
100%{transform:translateY(-10vh) rotate(360deg);opacity:0;}
}
.soul-title{
font-size:34px;font-weight:300;letter-spacing:5px;
color:#fff;
text-shadow:0 0 6px #a8b8ff,0 0 12px #839cff;
}
.broad{width:100%;height:36px;background:#b8c8ff;line-height:36px;overflow:hidden;}
.broad-text{white-space:nowrap;animation:broadRun 24s linear infinite;color:#0c101c;font-size:15px;}
@keyframes broadRun{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
nav{width:100%;background:rgba(20,26,44,0.75);padding:16px 0;text-align:center;border-bottom:1px solid #839cff60;backdrop-filter:blur(6px);}
nav a{color:#d0daff;text-decoration:none;margin:0 14px;padding:9px 16px;border-radius:26px;transition:0.4s;font-size:16px;}
nav a:hover{background:#839cff;color:#0c101c;box-shadow:0 0 14px #839cff70;}
.box{width:92%;max-width:1250px;margin:32px auto;padding:28px;border-radius:20px;border:1px solid #839cff40;background:rgba(30,38,60,0.4);box-shadow:0 0 30px #627fff20;backdrop-filter:blur(4px);}
.box h2{margin-bottom:22px;color:#a8b8ff;border-left:4px solid #839cff;padding-left:12px;font-weight:400;}
.comm-item{background:rgba(10,14,30,0.5);padding:20px;border-radius:14px;margin-bottom:18px;border:1px solid #839cff30;}
.comm-name{color:#a8b8ff;font-size:18px;margin-bottom:8px;}
.comm-time{color:#949fc7;font-size:13px;margin-bottom:10px;}
.comm-text{color:#d0daff;line-height:1.8;font-size:16px;}
input,textarea{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #839cff;background:rgba(12,16,28,0.7);color:#e8edf7;font-size:16px;}
.btn{display:inline-block;padding:11px 24px;background:linear-gradient(45deg,#839cff,#627fff);color:#0c101c;border:none;border-radius:32px;font-weight:500;cursor:pointer;margin:10px;transition:0.35s;font-size:15px;}
.btn-sm{padding:6px 14px;font-size:14px;}
.btn:hover{transform:scale(1.04);box-shadow:0 0 18px #839cff80;}
.theme-switch{position:fixed;top:18px;right:20px;z-index:999;}
footer{margin-top:60px;padding:24px;text-align:center;color:#949fc7;font-size:14px;border-top:1px solid #839cff25;}
</style>
</head>
<body class="dark">
<div class="theme-switch">
<button class="btn" onclick="toggleTheme()">切换静谧/温柔模式</button>
</div>
<div class="broad">
<div class="broad-text">玩家评论区｜分享游戏体验、推荐小游戏，本地永久保存留言</div>
</div>
<div style="text-align:center;margin:30px 0;">
<h1 class="soul-title">玩家留言评论</h1>
<p style="color:#c0ccff;margin-top:10px;letter-spacing:2px;">留下你的游玩感受</p>
</div>
<nav>
<a href="index.html">首页</a>
<a href="gameList.html">全部游戏</a>
<a href="snake.html">贪吃蛇</a>
<a href="block.html">俄罗斯方块</a>
<a href="puzzle.html">拼图游戏</a>
<a href="click.html">点击消消乐</a>
<a href="comment.html">玩家评论</a>
<a href="materialGame.html">背景素材</a>
</nav>
<div class="box">
<h2>发布评论</h2>
<input type="text" id="nickInput" placeholder="你的昵称">
<textarea id="textInput" rows="5" placeholder="说说你喜欢哪款小游戏、游玩感受..."></textarea>
<button class="btn" onclick="submitComment()">提交评论</button>
</div>
<div class="box">
<h2>全部玩家留言</h2>
<div id="commListBox"></div>
</div>
<footer>星屿小游戏站 © 2026 | 评论存储本地浏览器，清除缓存会清空</footer>
<script>
// 本地评论存储
function getCommData(){
    let data = localStorage.getItem("gameCommentList");
    return data ? JSON.parse(data) : [];
}
function saveCommData(arr){
    localStorage.setItem("gameCommentList",JSON.stringify(arr));
}
// 渲染评论
function renderComment(){
    const box = document.getElementById("commListBox");
    box.innerHTML = "";
    const list = getCommData();
    if(list.length === 0){
        box.innerHTML = "<p style='color:#949fc7'>暂无评论，快来第一条留言吧</p>";
        return;
    }
    list.forEach((item,idx)=>{
        let div = document.createElement("div");
        div.className = "comm-item";
        div.innerHTML = `
            <div class="comm-name">${item.nick}</div>
            <div class="comm-time">${item.time}</div>
            <div class="comm-text">${item.content}</div>
            <button class="btn btn-sm" onclick="delComm(${idx})">删除本条留言</button>
        `;
        box.appendChild(div);
    })
}
// 提交评论
function submitComment(){
    let nick = document.getElementById("nickInput").value.trim() || "匿名玩家";
    let content = document.getElementById("textInput").value.trim();
    if(!content){
        alert("请输入评论内容");
        return;
    }
    const time = new Date().toLocaleString();
    const arr = getCommData();
    arr.unshift({nick,content,time});
    saveCommData(arr);
    document.getElementById("nickInput").value = "";
    document.getElementById("textInput").value = "";
    renderComment();
    alert("评论发布成功！");
}
// 删除评论
function delComm(idx){
    const arr = getCommData();
    arr.splice(idx,1);
    saveCommData(arr);
    renderComment();
}

// 星空粒子
function createStar(){
const star = document.createElement('div');
star.className = 'star';
star.innerHTML = '✦';
star.style.left = Math.random()*100+'vw';
star.style.fontSize = Math.random()*18+6+'px';
star.style.color = ['#a8b8ff','#d0daff','#fff'][Math.floor(Math.random()*3)];
document.body.appendChild(star);
setTimeout(()=>star.remove(),12000);
}
setInterval(createStar,400);
function toggleTheme(){
document.body.classList.toggle('dark');
document.body.classList.toggle('light');
}
window.onload = function(){
renderComment();
let saveBg = localStorage.getItem("gameGlobalBg");
if(saveBg){
document.body.style.backgroundImage = `url(${saveBg})`;
document.body.style.backgroundSize = "cover";
document.body.style.backgroundAttachment = "fixed";
document.body.style.backgroundRepeat = "no-repeat";
}
}
</script>
</body>
</html>
